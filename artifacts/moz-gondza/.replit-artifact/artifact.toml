kind = "web"
previewPath = "/"
title = "Moz-Gondza"
version = "1.0.0"
id = "artifacts/moz-gondza"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20631

[services.development]
run = "pnpm --filter @workspace/moz-gondza run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/moz-gondza", "run", "build" ]
publicDir = "artifacts/moz-gondza/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20631"
BASE_PATH = "/"
