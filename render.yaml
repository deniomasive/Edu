# Moz-Gondza — Render Blueprint
#
# Deploy order (managed by Render): moz-gondza-db → moz-gondza-api → moz-gondza-frontend
#
# After FIRST deploy, set two env vars manually in the Render dashboard:
#   moz-gondza-api     → FRONTEND_URL = https://moz-gondza-frontend.onrender.com
#   moz-gondza-frontend → VITE_API_URL = https://moz-gondza-api.onrender.com
# Then trigger a manual redeploy of the frontend so the new VITE_API_URL is
# baked into the static build.

services:
  # ────────────────────────────────────────────────────────────────────────────
  # Backend — Node.js API (Express + Drizzle + PostgreSQL)
  # ────────────────────────────────────────────────────────────────────────────
  - type: web
    name: moz-gondza-api
    runtime: node
    plan: free
    autoDeploy: true
    rootDir: .

    # 1. Enable corepack so pnpm@10.26.1 (from packageManager field) is used.
    # 2. Install all workspace deps using the committed lockfile.
    # 3. Bundle the server with esbuild.
    # 4. Push the Drizzle schema to the database (idempotent, safe to re-run).
    buildCommand: >-
      corepack enable pnpm &&
      pnpm install --frozen-lockfile &&
      pnpm --filter @workspace/api-server run build &&
      pnpm --filter @workspace/db run push

    # Start the pre-built bundle — no pnpm needed at runtime.
    startCommand: node --enable-source-maps artifacts/api-server/dist/index.mjs

    healthCheckPath: /api/healthz

    envVars:
      - key: NODE_ENV
        value: production
      # Pin Node 22 LTS — Render also reads engines.node from package.json.
      - key: NODE_VERSION
        value: "22"
      # Injected automatically from the sibling database service.
      - key: DATABASE_URL
        fromDatabase:
          name: moz-gondza-db
          property: connectionString
      # Auto-generated strong secrets — no manual input needed.
      - key: JWT_SECRET
        generateValue: true
      - key: SESSION_SECRET
        generateValue: true
      # Set to the frontend service URL after first deploy, e.g.:
      # https://moz-gondza-frontend.onrender.com
      - key: FRONTEND_URL
        sync: false

  # ────────────────────────────────────────────────────────────────────────────
  # Frontend — React/Vite static site
  # ────────────────────────────────────────────────────────────────────────────
  - type: web
    name: moz-gondza-frontend
    runtime: static
    plan: free
    autoDeploy: true
    rootDir: .

    # Same install step, then build the Vite SPA.
    buildCommand: >-
      corepack enable pnpm &&
      pnpm install --frozen-lockfile &&
      pnpm --filter @workspace/moz-gondza run build

    # Vite outputs to artifacts/moz-gondza/dist/public (set in vite.config.ts).
    staticPublishPath: artifacts/moz-gondza/dist/public

    # SPA fallback — all paths serve index.html so React Router handles routing.
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

    envVars:
      - key: NODE_VERSION
        value: "22"
      # Set to the API service URL after first deploy, e.g.:
      # https://moz-gondza-api.onrender.com
      # main.tsx reads this at build time and calls setBaseUrl() so all API
      # requests are sent to the correct cross-origin URL.
      - key: VITE_API_URL
        sync: false
      # BASE_PATH and PORT are needed by vite.config.ts (used only by the
      # dev server config inside the config file, not by the build output).
      - key: BASE_PATH
        value: "/"
      - key: PORT
        value: "3000"

# ────────────────────────────────────────────────────────────────────────────
# PostgreSQL — free tier managed database
# ────────────────────────────────────────────────────────────────────────────
databases:
  - name: moz-gondza-db
    databaseName: mozgondza
    user: mozgondza
    plan: free
