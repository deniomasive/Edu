## Render.com deployment configuration for Moz-Gondza
## Deploy order: database → api → frontend
## Set FRONTEND_URL and VITE_API_URL manually in Render dashboard after first deploy.

services:
  # ── Backend API ──────────────────────────────────────────────────────────────
  - type: web
    name: moz-gondza-api
    runtime: node
    plan: free
    rootDir: .
    buildCommand: corepack enable pnpm && pnpm install --frozen-lockfile && pnpm --filter @workspace/api-server run build && pnpm --filter @workspace/db run push
    startCommand: node --enable-source-maps artifacts/api-server/dist/index.mjs
    healthCheckPath: /api/healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: moz-gondza-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: SESSION_SECRET
        generateValue: true
      # Set this to your Render frontend URL after first deploy, e.g.:
      # https://moz-gondza-frontend.onrender.com
      - key: FRONTEND_URL
        sync: false

  # ── Frontend Static Site ─────────────────────────────────────────────────────
  - type: web
    name: moz-gondza-frontend
    runtime: static
    plan: free
    rootDir: .
    buildCommand: corepack enable pnpm && pnpm install --frozen-lockfile && pnpm --filter @workspace/moz-gondza run build
    staticPublishPath: artifacts/moz-gondza/dist/public
    # SPA rewrite — all routes serve index.html
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      # Set this to your Render API URL after first deploy, e.g.:
      # https://moz-gondza-api.onrender.com
      - key: VITE_API_URL
        sync: false
      # Needed by vite.config.ts; / is the correct base for a root-deployed site
      - key: BASE_PATH
        value: /
      # Needed by vite.config.ts during build (used only by dev server, not build output)
      - key: PORT
        value: "3000"

# ── PostgreSQL Database ────────────────────────────────────────────────────────
databases:
  - name: moz-gondza-db
    databaseName: mozgondza
    user: mozgondza
    plan: free
